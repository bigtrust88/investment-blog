baseURL = "https://usstockstory.com/blogs/news/"
languageCode = "ko-kr"
title = "마켓뷰 - US Stock Market News"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
enableEmoji = true

[outputs]
  home = ["HTML", "JSON", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  homeInfoParams = [
    "마켓뷰",
    "미국과 한국 주식시장의 뉴스와 분석"
  ]
  author = "MarketView"
  env = "production"

  [params.profileMode]
    enabled = true
    title = "마켓뷰"
    subtitle = "US & KR Stock Market News"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [params.adsense]
    publisher_id = "ca-pub-3811219422484638"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "Archive"
    url = "/archives/"
    weight = 3

[taxonomies]
  category = "categories"
  tag = "tags"
